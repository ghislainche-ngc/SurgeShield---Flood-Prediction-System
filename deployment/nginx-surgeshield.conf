# SurgeShield Nginx reverse proxy.
#
# Replace __FRONTEND_HOST__ and __API_HOST__ before installing (see the runbook
# in deployment/README.md — a sed command does this). These start as plain
# HTTP; `certbot --nginx` rewrites them to add TLS (443) + an HTTP→HTTPS
# redirect automatically.

# ---- Frontend (Next.js on :3000) ----
server {
    listen 80;
    listen [::]:80;
    server_name __FRONTEND_HOST__;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket upgrade (Next dev HMR / any upgrades)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ---- Flask ML API (gunicorn on :5000) ----
server {
    listen 80;
    listen [::]:80;
    server_name __API_HOST__;

    # Predictions are small JSON payloads.
    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
