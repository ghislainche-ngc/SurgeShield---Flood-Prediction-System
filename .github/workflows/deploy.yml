# Deploy SurgeShield to the Contabo VPS.
#
# Runs automatically after the CI workflow succeeds on `main` (it SSHes into the
# VPS as the `surgeshield` service account and runs deployment/deploy.sh: pull →
# install deps → build → restart services). Decoupled from ci.yml via
# `workflow_run` so a cancelled/superseded CI run never interrupts a deploy.
# Can also be triggered manually from the Actions tab (workflow_dispatch).
#
# One-time setup (VPS authorized key, scoped sudoers, GitHub secrets) is in
# deployment/README.md → "Continuous deployment".
name: Deploy

on:
  workflow_run:
    workflows: ["CI"]      # must match the `name:` in ci.yml
    types: [completed]
    branches: [main]
  workflow_dispatch:       # manual "Run workflow" button

# Read-only repo token is plenty — the deploy happens over SSH, not via the API.
permissions:
  contents: read

# Never run two deploys at once, and never interrupt one mid-flight.
concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to VPS
    # Run on a manual dispatch, OR when CI actually passed for a push to main
    # (PR-triggered CI runs also fire workflow_run, but with event == "pull_request").
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Deployment environment — holds the VPS_* secrets and enables optional
    # approval/protection rules (Settings → Environments → production).
    environment: production
    steps:
      # No checkout needed: the VPS pulls the code itself via deploy.sh.
      - name: Run deploy.sh over SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}       # VPS IPv4 or hostname
          VPS_USER: ${{ secrets.VPS_USER }}       # the `surgeshield` service account
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }} # private deploy key (full PEM)
          VPS_PORT: ${{ secrets.VPS_PORT }}       # optional; defaults to 22
        run: |
          set -euo pipefail
          if [ -z "${VPS_HOST}" ] || [ -z "${VPS_USER}" ] || [ -z "${VPS_SSH_KEY}" ]; then
            echo "::error::Missing required secrets VPS_HOST / VPS_USER / VPS_SSH_KEY. See deployment/README.md."
            exit 1
          fi
          PORT="${VPS_PORT:-22}"
          install -d -m 700 ~/.ssh
          printf '%s\n' "${VPS_SSH_KEY}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Pin the host key (TOFU on first run). For stronger guarantees, store
          # the output of `ssh-keyscan` as a VPS_KNOWN_HOSTS secret instead.
          ssh-keyscan -p "${PORT}" "${VPS_HOST}" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -p "${PORT}" -i ~/.ssh/deploy_key -o IdentitiesOnly=yes \
            "${VPS_USER}@${VPS_HOST}" 'bash /opt/surgeshield/deployment/deploy.sh'
